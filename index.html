<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montessori Progresivo</title>
    <style>
        :root {
            --bg: #fdf6e3; --text: #5d4037; --accent: #d3a27f;
            --level1: #e63946; --level2: #457b9d; --level3: #a8dadc;
        }
        body { 
            margin: 0; background: var(--bg); font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none;
        }
        #header { text-align: center; padding: 10px; width: 100%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { margin: 5px; color: var(--text); font-size: 1.2rem; }
        #gameCanvas { background: white; border: 4px solid var(--accent); border-radius: 15px; margin: 10px; max-width: 95%; cursor: pointer; }
        .nav { display: flex; gap: 10px; margin-bottom: 10px; }
        button { 
            padding: 10px 20px; border-radius: 20px; border: none; background: var(--text); color: white; font-weight: bold;
        }
        .active-btn { background: #8fb339; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="header">
    <div class="nav">
        <button id="btn1" class="active-btn" onclick="changeLevel(1)">1. Cantidad</button>
        <button id="btn2" onclick="changeLevel(2)">2. Suma</button>
        <button id="btn3" onclick="changeLevel(3)">3. Letras</button>
    </div>
    <h2 id="msg">Cargando...</h2>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    
    let currentLevel = 1;
    let items = [];
    let targets = [];
    let dragItem = null;

    function initLevel(lvl) {
        currentLevel = lvl;
        items = [];
        targets = [];
        canvas.width = Math.min(window.innerWidth - 20, 600);
        canvas.height = 400;

        // Actualizar botones UI
        document.querySelectorAll('button').forEach((b, i) => b.className = (i+1 === lvl ? 'active-btn' : ''));

        if(lvl === 1) {
            msg.innerText = "Pon 4 manzanas en la cesta";
            for(let i=0; i<6; i++) items.push({x: 50 + i*80, y: 80, r: 30, color: '#e63946', in: false, type: 'apple'});
            targets.push({x: 150, y: 250, w: 300, h: 120, goal: 4});
        } 
        else if(lvl === 2) {
            msg.innerText = "¿Cuánto es 2 + 1? Arrastra el resultado";
            items.push({x: 100, y: 100, r: 35, val: 2, color: '#457b9d'});
            items.push({x: 300, y: 100, r: 35, val: 3, color: '#457b9d'});
            items.push({x: 500, y: 100, r: 35, val: 5, color: '#457b9d'});
            targets.push({x: 200, y: 250, w: 200, h: 100, goal: 3});
        }
        else if(lvl === 3) {
            msg.innerText = "Busca la letra 'A' de Abeja";
            const letras = ['E', 'A', 'O'];
            letras.forEach((l, i) => items.push({x: 100 + i*180, y: 100, r: 40, val: l, color: '#f4a261'}));
            targets.push({x: 200, y: 250, w: 200, h: 100, goal: 'A'});
        }
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar zonas de destino
        targets.forEach(t => {
            ctx.strokeStyle = '#ccc'; ctx.setLineDash([5, 5]);
            ctx.strokeRect(t.x, t.y, t.w, t.h);
            ctx.setLineDash([]);
            ctx.fillStyle = "#f0f0f0";
            ctx.fillRect(t.x, t.y, t.w, t.h);
        });

        // Dibujar objetos
        items.forEach(item => {
            ctx.beginPath();
            ctx.arc(item.x, item.y, item.r, 0, Math.PI*2);
            ctx.fillStyle = item.color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            if(item.val) ctx.fillText(item.val, item.x, item.y + 10);
            ctx.closePath();
        });
    }

    function handleInput(ex, ey) {
        const rect = canvas.getBoundingClientRect();
        const x = (ex - rect.left) * (canvas.width / rect.width);
        const y = (ey - rect.top) * (canvas.height / rect.height);
        
        items.forEach(item => {
            if(Math.hypot(item.x - x, item.y - y) < item.r) {
                dragItem = item;
            }
        });
    }

    function handleMove(ex, ey) {
        if(!dragItem) return;
        const rect = canvas.getBoundingClientRect();
        dragItem.x = (ex - rect.left) * (canvas.width / rect.width);
        dragItem.y = (ey - rect.top) * (canvas.height / rect.height);
        draw();
    }

    function handleEnd() {
        if(!dragItem) return;
        const t = targets[0];
        // Lógica de validación por nivel
        if(dragItem.x > t.x && dragItem.x < t.x + t.w && dragItem.y > t.y && dragItem.y < t.y + t.h) {
            if(currentLevel === 1) {
                dragItem.in = true;
                const count = items.filter(i => i.in).length;
                if(count >= t.goal) msg.innerText = "¡Muy bien! ¡Nivel completado! 🎉";
            } else {
                if(dragItem.val == t.goal) msg.innerText = "¡Correcto! Eres un genio 🌟";
                else { msg.innerText = "Intenta otra vez..."; setTimeout(()=>initLevel(currentLevel), 1000); }
            }
        }
        dragItem = null;
    }

    // Eventos
    canvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleEnd);
    
    canvas.addEventListener('touchstart', e => handleInput(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchend', handleEnd);

    function changeLevel(l) { initLevel(l); }
    
    window.onload = () => initLevel(1);
</script>
</body>
</html>
