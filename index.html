<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montessori Kids - Aprende a Contar</title>
    <style>
        /* CSS INTEGRADO */
        :root {
            --bg-color: #fdf6e3;
            --accent-color: #d3a27f;
            --apple-color: #e63946;
            --basket-color: #bc6c25;
            --text-color: #5d4037;
            --success-color: #8fb339;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Crucial para evitar scroll al arrastrar */
        }

        #ui-container {
            text-align: center;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        h1 {
            color: var(--text-color);
            font-size: 1.5rem;
            margin: 10px 0;
        }

        #gameCanvas {
            background: #ffffff;
            border: 4px solid var(--accent-color);
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 95%;
            max-height: 70vh;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #6e8a2b;
            transition: transform 0.1s;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #6e8a2b;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 id="instruction">🍎 Arrastra 3 manzanas a la cesta</h1>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button onclick="resetGame()">Reiniciar Juego</button>
    </div>

    <script>
        /* JS INTEGRADO */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');

        // Configuración de pantalla
        function resize() {
            canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth - 20;
            canvas.height = 450;
            draw();
        }

        // Estado del juego
        let apples = [
            { id: 1, x: 80, y: 100, r: 35, color: '#e63946', dragging: false, inBasket: false },
            { id: 2, x: 170, y: 100, r: 35, color: '#e63946', dragging: false, inBasket: false },
            { id: 3, x: 260, y: 100, r: 35, color: '#e63946', dragging: false, inBasket: false }
        ];

        const basket = { x: 450, y: 250, w: 250, h: 150 };
        let dragItem = null;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Cesta (Estética simple)
            ctx.fillStyle = '#bc6c25';
            ctx.beginPath();
            ctx.roundRect(basket.x, basket.y, basket.w, basket.h, 20);
            ctx.fill();
            
            // Texto de la cesta
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("CESTA", basket.x + basket.w/2, basket.y + basket.h/2 + 10);

            // Dibujar Manzanas
            apples.forEach(apple => {
                ctx.beginPath();
                ctx.arc(apple.x, apple.y, apple.r, 0, Math.PI * 2);
                ctx.fillStyle = apple.color;
                ctx.fill();
                // Tallo de la manzana
                ctx.fillStyle = '#4b2c20';
                ctx.fillRect(apple.x - 2, apple.y - apple.r - 5, 4, 10);
                ctx.closePath();
            });
        }

        // Manejadores de eventos (Mouse y Touch)
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function onStart(e) {
            const coords = getCoords(e);
            apples.forEach(apple => {
                const dist = Math.hypot(apple.x - coords.x, apple.y - coords.y);
                if (dist < apple.r) {
                    apple.dragging = true;
                    dragItem = apple;
                }
            });
        }

        function onMove(e) {
            if (!dragItem) return;
            const coords = getCoords(e);
            dragItem.x = coords.x;
            dragItem.y = coords.y;
            
            // Check si entró en la cesta
            if (dragItem.x > basket.x && dragItem.x < basket.x + basket.w &&
                dragItem.y > basket.y && dragItem.y < basket.y + basket.h) {
                dragItem.inBasket = true;
            } else {
                dragItem.inBasket = false;
            }
            
            checkWin();
            draw();
        }

        function onEnd() {
            if (dragItem) dragItem.dragging = false;
            dragItem = null;
        }

        function checkWin() {
            const totalIn = apples.filter(a => a.inBasket).length;
            if (totalIn === 3) {
                instruction.innerHTML = "¡Excelente! 🎉 Lo lograste.";
                instruction.style.color = "#8fb339";
            } else {
                instruction.innerHTML = `🍎 Arrastra 3 manzanas (Llevas: ${totalIn})`;
                instruction.style.color = "#5d4037";
            }
        }

        function resetGame() {
            apples.forEach((a, i) => {
                a.x = 80 + (i * 90);
                a.y = 100;
                a.inBasket = false;
            });
            instruction.innerHTML = "🍎 Arrastra 3 manzanas a la cesta";
            instruction.style.color = "#5d4037";
            draw();
        }

        // Listeners
        canvas.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { onMove(e); }, {passive: false});
        window.addEventListener('touchend', onEnd);

        window.addEventListener('resize', resize);
        resize(); // Inicializar

    </script>
</body>
</html>
