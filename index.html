<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montessori Kids - MultiJuegos</title>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #f5a623; --success: #7ed321;
            --bg: #fdf6e3; --text: #4a4a4a; --white: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Pantallas */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .active { display: flex; }

        /* Menú Principal */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; }
        .card { 
            background: var(--white); border-radius: 20px; padding: 20px; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; border: 4px solid transparent;
        }
        .card:active { transform: scale(0.95); }
        .card.math { border-color: var(--primary); }
        .card.abc { border-color: var(--secondary); }
        .card.logic { border-color: var(--success); }
        .icon { font-size: 3rem; display: block; margin-bottom: 10px; }

        /* Área de Juego */
        canvas { background: var(--white); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); touch-action: none; max-width: 100%; }
        .hud { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-back { padding: 10px 20px; border-radius: 15px; border: none; background: #ee6b6e; color: white; font-weight: bold; cursor: pointer; }
        
        #msg-feedback { font-size: 1.5rem; font-weight: bold; margin-top: 15px; text-align: center; min-height: 2rem; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1>¡Hola! ¿Qué jugamos hoy?</h1>
        <div class="menu-grid">
            <div class="card math" onclick="startGame('math')">
                <span class="icon">➕</span>
                <strong>Sumas</strong>
            </div>
            <div class="card abc" onclick="startGame('abc')">
                <span class="icon">🅰️</span>
                <strong>Letras</strong>
            </div>
            <div class="card logic" onclick="startGame('logic')">
                <span class="icon">🧩</span>
                <strong>Formas</strong>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="hud">
            <button class="btn-back" onclick="showMenu()">⬅ Salir</button>
            <div id="level-indicator">Nivel 1</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="msg-feedback"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const feedback = document.getElementById('msg-feedback');
        let currentGame = '';
        let level = 1;
        let elements = [];
        let target = null;
        let dragItem = null;

        function showMenu() {
            document.getElementById('screen-menu').classList.add('active');
            document.getElementById('screen-game').classList.remove('active');
        }

        function startGame(type) {
            currentGame = type;
            level = 1;
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            setupLevel();
        }

        function setupLevel() {
            canvas.width = Math.min(window.innerWidth - 40, 600);
            canvas.height = 400;
            elements = [];
            feedback.innerText = "";
            document.getElementById('level-indicator').innerText = "Nivel " + level;

            if (currentGame === 'math') {
                // JUEGO DE MATEMÁTICAS: ASOCIACIÓN
                let num1 = Math.floor(Math.random() * 3) + 1;
                let num2 = Math.floor(Math.random() * 2) + 1;
                let correct = num1 + num2;
                target = { text: `${num1} + ${num2} = ?`, goal: correct, x: canvas.width/2 - 100, y: 250, w: 200, h: 100 };
                
                // Opciones
                [correct, correct + 1, correct - 1].sort(() => Math.random() - 0.5).forEach((val, i) => {
                    elements.push({ x: 100 + i*180, y: 100, r: 40, val: val, color: '#4a90e2' });
                });

            } else if (currentGame === 'abc') {
                // JUEGO DE LETRAS: COMPLETAR PALABRA
                const words = [{p: '_ TO', l: 'G', full: 'GATO'}, {p: 'L_NA', l: 'U', full: 'LUNA'}, {p: 'M_MA', l: 'A', full: 'MAMA'}];
                let word = words[Math.min(level - 1, words.length - 1)];
                target = { text: word.p, goal: word.l, x: canvas.width/2 - 120, y: 250, w: 240, h: 100 };
                
                ['A', 'G', 'U', 'E'].sort(() => Math.random() - 0.5).forEach((val, i) => {
                    elements.push({ x: 80 + i*140, y: 100, r: 40, val: val, color: '#f5a623' });
                });

            } else if (currentGame === 'logic') {
                // JUEGO DE LÓGICA: COLORES Y FORMAS
                const colors = ['#ff5252', '#7ed321', '#4a90e2'];
                let correctColor = colors[Math.floor(Math.random()*colors.length)];
                target = { text: 'Pon el círculo aquí', goal: correctColor, x: canvas.width/2 - 75, y: 250, w: 150, h: 100 };
                
                colors.forEach((col, i) => {
                    elements.push({ x: 120 + i*180, y: 100, r: 45, val: '', color: col });
                });
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar Target (Zona de respuesta)
            ctx.fillStyle = "#f9f9f9";
            ctx.strokeStyle = "#ddd";
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 5]);
            ctx.beginPath();
            ctx.roundRect(target.x, target.y, target.w, target.h, 15);
            ctx.fill();
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = "#333";
            ctx.font = "bold 32px Arial";
            ctx.textAlign = "center";
            ctx.fillText(target.text, target.x + target.w/2, target.y + target.h/2 + 12);

            // Dibujar Elementos Arrastrables
            elements.forEach(el => {
                ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.1)";
                ctx.beginPath();
                ctx.arc(el.x, el.y, el.r, 0, Math.PI*2);
                ctx.fillStyle = el.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if(el.val !== '') {
                    ctx.fillStyle = "white";
                    ctx.font = "bold 35px Arial";
                    ctx.fillText(el.val, el.x, el.y + 12);
                }
            });
        }

        // Lógica Táctil/Mouse
        function handleStart(ex, ey) {
            const rect = canvas.getBoundingClientRect();
            const x = (ex - rect.left) * (canvas.width / rect.width);
            const y = (ey - rect.top) * (canvas.height / rect.height);
            elements.forEach(el => {
                if (Math.hypot(el.x - x, el.y - y) < el.r) dragItem = el;
            });
        }

        function handleMove(ex, ey) {
            if (!dragItem) return;
            const rect = canvas.getBoundingClientRect();
            dragItem.x = (ex - rect.left) * (canvas.width / rect.width);
            dragItem.y = (ey - rect.top) * (canvas.height / rect.height);
            draw();
        }

        function handleEnd() {
            if (!dragItem) return;
            
            // Validar si cayó en el target
            if (dragItem.x > target.x && dragItem.x < target.x + target.w && 
                dragItem.y > target.y && dragItem.y < target.y + target.h) {
                
                let isCorrect = false;
                if (currentGame === 'logic') isCorrect = (dragItem.color === target.goal);
                else isCorrect = (dragItem.val == target.goal);

                if (isCorrect) {
                    feedback.innerText = "¡Excelente! 🌟";
                    feedback.style.color = "var(--success)";
                    setTimeout(() => { level++; setupLevel(); }, 1200);
                } else {
                    feedback.innerText = "Casi... ¡intenta otra vez! 😉";
                    feedback.style.color = "#ee6b6e";
                    setTimeout(() => setupLevel(), 1000);
                }
            } else {
                setupLevel(); // Regresar a su sitio
            }
            dragItem = null;
        }

        // Listeners
        canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('touchend', handleEnd);

    </script>
</body>
</html>
